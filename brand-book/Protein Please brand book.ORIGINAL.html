document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"12256557-88d7-4f18-8616-a1eee8224964\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f3467fce-d19b-46df-b074-1f97d1d6c50c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f6e56179-a6cf-4541-b0d0-6bac728f575c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ec198450-275e-4aca-af9e-ac3121079403\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4c14efef-89eb-4914-80c5-302d8acc480a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"92abea8a-205d-4b22-a678-e1830de04b33\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2f579d01-948a-4f64-9009-0dfb73858b0f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Protein Please — Color tokens\n   Brand is deep forest green + soft pink on warm cream. Minimal, editorial, food-forward.\n   Base palette first, then semantic aliases. Use the aliases in product code. */\n\n:root {\n  /* ---- Brand: Green (the hero color — wordmark, ink, dark surfaces) ---- */\n  --pp-green-900: #13200E; /* near-black green, deepest ink */\n  --pp-green-800: #1D2F17; /* PRIMARY brand green (logo, dark surfaces) */\n  --pp-green-700: #284121;\n  --pp-green-600: #36562C;\n  --pp-green-500: #4A7039;\n  --pp-green-100: #DCE5D4; /* faint green tint for fills on cream */\n\n  /* ---- Brand: Pink (the foil — badges, accents, playful surfaces) ---- */\n  --pp-pink-500: #DCA7C4; /* deepest usable pink (borders, hover) */\n  --pp-pink-400: #E8BBD3;\n  --pp-pink-300: #EFCFDF; /* PRIMARY soft pink (badges, accent fills) */\n  --pp-pink-200: #F5E0EB;\n  --pp-pink-100: #FBF0F5; /* whisper pink wash */\n\n  /* ---- Neutrals: warm cream paper, never cold grey ---- */\n  --pp-white:     #FFFFFF;\n  --pp-cream-50:  #FBF8EF; /* lightest paper */\n  --pp-cream-100: #F6F2E6; /* PRIMARY page cream */\n  --pp-cream-200: #EDE7D4; /* inset / sunken cream */\n  --pp-cream-300: #E2DAC2; /* hairline on cream */\n  --pp-stone-400: #B7B09B; /* muted captions on cream */\n  --pp-stone-600: #6E6A58; /* secondary text on cream */\n\n  /* ---- Signal: pulled from a real plate, not a UI kit ---- */\n  --pp-tomato:  #D6462F; /* error, spice, \"non-veg\" */\n  --pp-tomato-100: #FBE3DD;\n  --pp-leaf:    #3E8E4E; /* success, \"veg\", fresh */\n  --pp-leaf-100:  #DEEFE0;\n  --pp-yolk:    #E8B23A; /* warning, highlight */\n  --pp-yolk-100:  #FBEFCF;\n\n  /* ============ SEMANTIC ALIASES ============ */\n  /* Surfaces */\n  --bg-page:        var(--pp-cream-100);\n  --bg-inset:       var(--pp-cream-200);\n  --surface:        var(--pp-white);\n  --surface-card:   var(--pp-cream-50);\n  --surface-green:  var(--pp-green-800); /* dark hero / footer */\n  --surface-green-deep: var(--pp-green-900);\n  --surface-pink:   var(--pp-pink-300);\n  --surface-pink-soft: var(--pp-pink-100);\n\n  /* Text */\n  --text-primary:   var(--pp-green-900);\n  --text-secondary: var(--pp-stone-600);\n  --text-muted:     var(--pp-stone-400);\n  --text-inverse:   var(--pp-cream-50);  /* on green */\n  --text-on-pink:   var(--pp-green-900);\n  --text-brand:     var(--pp-green-800);\n\n  /* Lines */\n  --border:         var(--pp-cream-300);\n  --border-strong:  var(--pp-green-800);\n  --border-on-green: rgba(246,242,230,0.18);\n  --border-on-green-strong: rgba(246,242,230,0.45);\n\n  /* Accent / interactive */\n  --accent:          var(--pp-green-800);\n  --accent-contrast: var(--pp-cream-50);\n  --accent-pink:     var(--pp-pink-300);\n  --focus-ring:      var(--pp-pink-400);\n\n  /* Status */\n  --success: var(--pp-leaf);\n  --danger:  var(--pp-tomato);\n  --warning: var(--pp-yolk);\n  --veg:     var(--pp-leaf);\n  --non-veg: var(--pp-tomato);\n}\n\n/* Protein Please — Typography tokens\n   Three voices:\n   - DISPLAY (Anton): loud, condensed, ALL-CAPS. Headlines & the wordmark. Use tight.\n   - BODY (Hanken Grotesk): warm, legible grotesque. Everything readable.\n   - MONO (Space Mono): macros, nutrition numbers, eyebrows, fine print. The \"lab\" voice. */\n\n:root {\n  /* families */\n  --font-display: 'Anton', 'Arial Narrow', sans-serif;\n  --font-body: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;\n  --font-mono: 'Space Mono', 'SFMono-Regular', ui-monospace, monospace;\n\n  /* weights (Hanken) */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-extra: 800; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* fluid display sizes — Anton, set TIGHT */\n  --text-display-xl: clamp(3.5rem, 9vw, 8rem);   /* hero wordmark scale */\n  --text-display-lg: clamp(2.75rem, 6vw, 5rem);\n  --text-display-md: clamp(2rem, 4vw, 3.25rem);\n  --text-display-sm: 1.75rem;\n\n  /* body / heading sizes */\n  --text-h1: 2.25rem;\n  --text-h2: 1.75rem;\n  --text-h3: 1.375rem;\n  --text-lg: 1.125rem;\n  --text-base: 1rem;\n  --text-sm: 0.875rem;\n  --text-xs: 0.75rem;\n\n  /* mono / label */\n  --text-eyebrow: 0.78rem; /* uppercase mono kicker */\n\n  /* line heights */\n  --lh-display: 0.92;   /* @kind font */ /* Anton wants to be cramped */\n  --lh-tight: 1.1;  /* @kind font */\n  --lh-snug: 1.3;   /* @kind font */\n  --lh-body: 1.55;  /* @kind font */\n\n  /* letter spacing */\n  --ls-display: -0.01em; /* @kind font */\n  --ls-tight: -0.02em;   /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-eyebrow: 0.18em;  /* @kind font */ /* wide-tracked mono kickers */\n  --ls-caps: 0.04em;     /* @kind font */\n}\n\n/* Protein Please — Spacing, radius, shadow, motion, layout\n   Spacing: 4px base grid. Radius: soft but not bubbly — capsules for pills, gentle on cards.\n   Shadows: low, warm, sparing. The brand leans flat + bordered over heavy drop shadows. */\n\n:root {\n  /* spacing scale (4px base) */\n  --space-0: 0;\n  --space-1: 0.25rem;  /* 4 */\n  --space-2: 0.5rem;   /* 8 */\n  --space-3: 0.75rem;  /* 12 */\n  --space-4: 1rem;     /* 16 */\n  --space-5: 1.5rem;   /* 24 */\n  --space-6: 2rem;     /* 32 */\n  --space-7: 2.5rem;   /* 40 */\n  --space-8: 3rem;     /* 48 */\n  --space-9: 4rem;     /* 64 */\n  --space-10: 5rem;    /* 80 */\n  --space-12: 7.5rem;  /* 120 */\n\n  /* radii */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 14px;   /* default card */\n  --radius-lg: 22px;   /* large cards / sheets */\n  --radius-xl: 32px;\n  --radius-pill: 999px; /* buttons, badges, chips — the brand default for controls */\n\n  /* borders */\n  --border-w: 1.5px; /* @kind spacing */\n  --border-w-bold: 2px; /* @kind spacing */\n\n  /* shadows — warm-tinted, low. Use rarely. */\n  --shadow-xs: 0 1px 2px rgba(19,32,14,0.06);\n  --shadow-sm: 0 2px 8px rgba(19,32,14,0.07);\n  --shadow-md: 0 10px 28px rgba(19,32,14,0.10);\n  --shadow-lg: 0 24px 60px rgba(19,32,14,0.14);\n  /* \"lifted\" card on cream */\n  --shadow-card: 0 1px 0 rgba(255,255,255,0.6), 0 8px 22px rgba(19,32,14,0.08);\n\n  /* motion */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */ /* gentle overshoot for press/pop */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 220ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n\n  /* layout */\n  --container: 1200px; /* @kind spacing */\n  --container-narrow: 760px; /* @kind spacing */\n  --gutter: clamp(1.25rem, 5vw, 4rem); /* @kind spacing */\n}\n\n/* Protein Please — base resets + brand utility classes.\n   Tokens must be imported before this. Keep this lean: resets, body defaults,\n   and a few reusable brand primitives (eyebrow, display heading, protein badge). */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-weight: var(--fw-regular);\n  font-size: var(--text-base);\n  line-height: var(--lh-body);\n  color: var(--text-primary);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection { background: var(--pp-pink-300); color: var(--pp-green-900); }\n\na { color: inherit; }\n\n/* ---- Display heading: Anton, caps, cramped ---- */\n.pp-display {\n  font-family: var(--font-display);\n  font-weight: 400;\n  text-transform: uppercase;\n  line-height: var(--lh-display);\n  letter-spacing: var(--ls-display);\n  margin: 0;\n}\n\n/* ---- Eyebrow / kicker: wide-tracked mono caps ---- */\n.pp-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-eyebrow);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-eyebrow);\n  color: var(--text-secondary);\n}\n\n/* ---- Mono data label ---- */\n.pp-mono {\n  font-family: var(--font-mono);\n  letter-spacing: 0.01em;\n  font-variant-numeric: tabular-nums;\n}\n\n/* ---- The signature protein badge: pink disc, rotated, mono text ---- */\n.pp-protein-badge {\n  display: inline-flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 0;\n  width: 120px;\n  height: 120px;\n  border-radius: var(--radius-pill);\n  background: var(--surface-pink);\n  color: var(--text-on-pink);\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-caps);\n  transform: rotate(-12deg);\n}\n.pp-protein-badge .pp-protein-num {\n  font-family: var(--font-display);\n  font-size: 2.6rem;\n  line-height: 0.85;\n  letter-spacing: 0;\n}\n.pp-protein-badge .pp-protein-unit { font-size: 0.62rem; font-weight: 700; }\n\n<\u002Fstyle>\n\n<style>\n  /* ---- Brand book layout ---- */\n  html { scroll-behavior: smooth; }\n  body { background: var(--pp-cream-100); color: var(--text-primary); }\n  img { display: block; max-width: 100%; }\n\n  .bb-wrap { max-width: 1080px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 56px); }\n\n  /* section scaffolding */\n  .bb-section { padding: clamp(56px, 8vw, 110px) 0; border-top: 1.5px solid var(--pp-cream-300); }\n  .bb-section:first-of-type { border-top: none; }\n  .bb-head { margin-bottom: clamp(28px, 4vw, 52px); }\n  .bb-num { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; color: var(--pp-pink-500); }\n  .bb-title { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(2.4rem, 6vw, 4.6rem); line-height: 0.9; letter-spacing: -0.01em; color: var(--pp-green-800); margin: 12px 0 0; }\n  .bb-lede { font-size: clamp(1.05rem, 2vw, 1.3rem); line-height: 1.5; color: var(--text-secondary); max-width: 640px; margin: 18px 0 0; }\n  .bb-eyebrow { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); margin: 0 0 14px; }\n\n  /* cover */\n  .bb-cover { background: var(--pp-green-900); color: var(--pp-cream-50); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: clamp(28px, 5vw, 56px); position: relative; overflow: hidden; }\n  .bb-cover-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; position: relative; z-index: 2; }\n  .bb-cover-logo { height: clamp(40px, 6vw, 64px); }\n  .bb-cover-meta { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--pp-pink-300); text-align: right; line-height: 1.7; }\n  .bb-cover-mid { position: relative; z-index: 2; }\n  .bb-cover-h1 { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(3.4rem, 11vw, 9.5rem); line-height: 0.86; letter-spacing: -0.015em; margin: 0; }\n  .bb-cover-h1 em { color: var(--pp-pink-300); font-style: normal; }\n  .bb-cover-sub { font-size: clamp(1.1rem, 2vw, 1.4rem); color: rgba(251,248,239,0.8); max-width: 540px; margin: 28px 0 0; line-height: 1.5; }\n  .bb-cover-foot { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; position: relative; z-index: 2; font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(251,248,239,0.6); }\n  .bb-cover-disc { position: absolute; top: 50%; right: clamp(-40px, -2vw, -10px); transform: translateY(-30%) rotate(-12deg); z-index: 1; }\n\n  /* the disc */\n  .disc { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 50%; text-align: center; }\n  .disc .num { font-family: var(--font-display); line-height: 0.8; letter-spacing: -0.01em; }\n  .disc .unit { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 5px; max-width: 62%; line-height: 1.15; }\n\n  /* generic grid helpers */\n  .bb-grid { display: grid; gap: 16px; }\n  .cols-2 { grid-template-columns: repeat(2, 1fr); }\n  .cols-3 { grid-template-columns: repeat(3, 1fr); }\n  .cols-4 { grid-template-columns: repeat(4, 1fr); }\n  .cols-5 { grid-template-columns: repeat(5, 1fr); }\n  @media (max-width: 760px) { .cols-3, .cols-4, .cols-5 { grid-template-columns: repeat(2, 1fr); } .cols-2 { grid-template-columns: 1fr; } }\n\n  /* swatches */\n  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1.5px solid var(--pp-cream-300); background: var(--surface); }\n  .sw .chip { height: 92px; }\n  .sw .meta { padding: 10px 13px; }\n  .sw .nm { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }\n  .sw .hx { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; }\n  .sw .role { font-size: 0.74rem; color: var(--text-secondary); margin-top: 6px; line-height: 1.35; }\n\n  /* pairings */\n  .pair { border-radius: var(--radius-md); height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }\n  .pair .w { font-family: var(--font-display); font-size: 2.6rem; text-transform: uppercase; line-height: 0.9; }\n  .pair .c { font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.75; }\n\n  /* type specimens */\n  .spec { border: 1.5px solid var(--pp-cream-300); border-radius: var(--radius-md); background: var(--pp-cream-50); padding: clamp(20px, 3vw, 32px); }\n  .spec + .spec { margin-top: 16px; }\n  .spec .tag { display: flex; flex-wrap: wrap; gap: 10px 18px; font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 18px; }\n  .spec .tag b { color: var(--pp-green-800); }\n  .typeline { display: flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--pp-cream-300); }\n  .typeline:last-child { border-bottom: none; }\n  .typeline .lbl { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); width: 96px; flex: 0 0 auto; }\n\n  /* cards / generic panel */\n  .panel { background: var(--pp-cream-50); border: 1.5px solid var(--pp-cream-300); border-radius: var(--radius-md); padding: clamp(20px, 3vw, 30px); }\n  .panel.green { background: var(--pp-green-800); color: var(--pp-cream-50); border-color: var(--pp-green-800); }\n  .panel.pink { background: var(--pp-pink-200); border-color: var(--pp-pink-300); }\n\n  /* do / don't */\n  .dd { border-radius: var(--radius-md); border: 1.5px solid var(--pp-cream-300); background: var(--pp-cream-50); overflow: hidden; }\n  .dd .bar { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 11px 16px; display: flex; align-items: center; gap: 9px; }\n  .dd.do .bar { background: var(--pp-leaf-100); color: #235C2C; }\n  .dd.dont .bar { background: var(--pp-tomato-100); color: #9A2A1A; }\n  .dd ul { margin: 0; padding: 16px 16px 18px 34px; display: flex; flex-direction: column; gap: 9px; }\n  .dd li { font-size: 0.92rem; line-height: 1.45; }\n\n  /* component reproductions (static) */\n  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 22px; font-family: var(--font-body); font-weight: 700; font-size: 0.94rem; line-height: 1; border-radius: var(--radius-pill); border: 1.5px solid transparent; cursor: default; }\n  .btn.caps { text-transform: uppercase; letter-spacing: 0.04em; }\n  .btn.primary { background: var(--pp-green-800); color: var(--pp-cream-50); }\n  .btn.pink { background: var(--pp-pink-300); color: var(--pp-green-900); }\n  .btn.outline { background: transparent; color: var(--pp-green-800); border-color: var(--pp-green-800); }\n  .btn.ghost { background: transparent; color: var(--pp-green-800); }\n  .btn.inverse { background: var(--pp-cream-50); color: var(--pp-green-900); }\n\n  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; font-family: var(--font-mono); font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1; border-radius: var(--radius-pill); border: 1.5px solid transparent; }\n  .badge.green { background: var(--pp-green-800); color: var(--pp-cream-50); }\n  .badge.pink { background: var(--pp-pink-300); color: var(--pp-green-900); }\n  .badge.veg { background: var(--pp-leaf-100); color: #235C2C; border-color: var(--pp-leaf); }\n  .badge.nonveg { background: var(--pp-tomato-100); color: #9A2A1A; border-color: var(--pp-tomato); }\n  .badge.neutral { background: var(--pp-cream-200); color: var(--pp-stone-600); }\n  .dietsq { width: 10px; height: 10px; border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; }\n  .dietsq i { width: 50%; height: 50%; border-radius: 50%; display: block; }\n\n  .cluster { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }\n  .field { display: flex; flex-direction: column; gap: 6px; }\n  .field label { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); }\n  .field .ip { background: var(--pp-white); border: 1.5px solid var(--pp-cream-300); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.95rem; color: var(--text-muted); }\n  .field .ip.focus { border-color: var(--pp-green-800); box-shadow: 0 0 0 3px var(--pp-pink-200); color: var(--text-primary); }\n  .pillswitch { width: 48px; height: 28px; border-radius: 99px; position: relative; background: var(--pp-green-800); }\n  .pillswitch i { position: absolute; top: 3px; left: 23px; width: 22px; height: 22px; border-radius: 50%; background: var(--pp-cream-50); }\n  .pillswitch.off { background: var(--pp-cream-300); }\n  .pillswitch.off i { left: 3px; }\n  .tabs { display: inline-flex; gap: 4px; padding: 4px; background: var(--pp-cream-200); border-radius: var(--radius-pill); }\n  .tabs span { padding: 9px 18px; border-radius: var(--radius-pill); font-weight: 700; font-size: 0.875rem; color: var(--pp-stone-600); }\n  .tabs span.on { background: var(--pp-green-800); color: var(--pp-cream-50); }\n\n  /* spacing scale */\n  .sprow { display: flex; align-items: center; gap: 14px; padding: 5px 0; }\n  .sprow .t { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; width: 92px; flex: 0 0 auto; }\n  .sprow .p { font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-muted); width: 40px; flex: 0 0 auto; }\n  .sprow .bar { height: 16px; background: var(--pp-pink-300); border-radius: 3px; }\n\n  .radii { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }\n  .radii .it { text-align: center; }\n  .radii .box { width: 88px; height: 66px; background: var(--pp-cream-50); border: 1.5px solid var(--pp-green-800); }\n  .radii .nm { font-family: var(--font-mono); font-size: 0.64rem; font-weight: 700; margin-top: 8px; }\n  .radii .vl { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); }\n\n  .elev { display: flex; flex-wrap: wrap; gap: 24px; }\n  .elev .it { text-align: center; }\n  .elev .box { width: 120px; height: 78px; background: var(--pp-cream-50); border-radius: var(--radius-md); border: 1px solid var(--pp-cream-300); }\n  .elev .nm { font-family: var(--font-mono); font-size: 0.62rem; font-weight: 700; margin-top: 12px; }\n\n  /* icon strip */\n  .icons { display: flex; flex-wrap: wrap; gap: 14px; }\n  .icons .ic { width: 60px; height: 60px; border-radius: var(--radius-md); background: var(--pp-cream-50); border: 1.5px solid var(--pp-cream-300); display: flex; align-items: center; justify-content: center; color: var(--pp-green-800); }\n  .icons .ic.pink { background: var(--pp-pink-200); border-color: var(--pp-pink-300); }\n\n  .logo-cell { border-radius: var(--radius-md); border: 1.5px solid var(--pp-cream-300); display: flex; align-items: center; justify-content: center; height: 220px; overflow: hidden; }\n  .logo-cell img { height: 120px; }\n\n  .footer { background: var(--pp-green-900); color: var(--pp-cream-50); padding: clamp(48px,6vw,80px) 0 40px; }\n  .footer .bb-wrap { display: flex; flex-direction: column; gap: 26px; }\n  .footer-tag { font-family: var(--font-display); text-transform: uppercase; font-size: clamp(2rem,5vw,3.4rem); line-height: 0.92; }\n  .footer-tag em { color: var(--pp-pink-300); font-style: normal; }\n  .footer-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(251,248,239,0.6); padding-top: 24px; border-top: 1.5px solid rgba(246,242,230,0.18); }\n\n  /* TOC */\n  .toc { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 28px; }\n  @media (max-width: 760px){ .toc { grid-template-columns: 1fr; } }\n  .toc a { display: flex; align-items: baseline; gap: 12px; text-decoration: none; color: var(--text-primary); padding: 9px 0; border-bottom: 1px solid var(--pp-cream-300); }\n  .toc a:hover { opacity: 0.6; }\n  .toc .n { font-family: var(--font-mono); font-size: 0.74rem; color: var(--pp-pink-500); font-weight: 700; }\n  .toc .l { font-family: var(--font-display); text-transform: uppercase; font-size: 1.3rem; letter-spacing: -0.005em; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============ COVER ============ -->\n<header class=\"bb-cover\">\n  <div class=\"bb-cover-top\">\n    <img class=\"bb-cover-logo\" src=\"b7fe3336-39e5-4de1-a0f9-441f3a26387c\" alt=\"Protein Please\">\n    <div class=\"bb-cover-meta\">Brand Book<br>v1.0 · 2026<br>Confidential<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"bb-cover-disc\">\n    <span class=\"disc\" style=\"width:240px;height:240px;background:var(--pp-pink-300);color:var(--pp-green-900)\">\n      <span class=\"num\" style=\"font-size:6rem\">38<\u002Fspan>\n      <span class=\"unit\" style=\"font-size:0.92rem\">grams of protein<\u002Fspan>\n    <\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"bb-cover-mid\">\n    <p class=\"bb-eyebrow\" style=\"color:var(--pp-pink-300)\">★ The complete brand &amp; design guide<\u002Fp>\n    <h1 class=\"bb-cover-h1\">So good<br>you'll forget<br>it's <em>healthy<\u002Fem><\u002Fh1>\n    <p class=\"bb-cover-sub\">High-protein meals — veg &amp; non-veg — crafted so the food is the point, and the nutrition is the bonus.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"bb-cover-foot\">\n    <span>Protein Please<\u002Fspan>\n    <span>Eat well, deliciously<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n  <!-- ============ CONTENTS ============ -->\n  <section class=\"bb-section\" id=\"contents\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">00 — Contents<\u002Fspan>\n        <h2 class=\"bb-title\">What's inside<\u002Fh2>\n      <\u002Fdiv>\n      <nav class=\"toc\">\n        <a href=\"#story\"><span class=\"n\">01<\u002Fspan><span class=\"l\">The Brand<\u002Fspan><\u002Fa>\n        <a href=\"#logo\"><span class=\"n\">02<\u002Fspan><span class=\"l\">Logo<\u002Fspan><\u002Fa>\n        <a href=\"#color\"><span class=\"n\">03<\u002Fspan><span class=\"l\">Color<\u002Fspan><\u002Fa>\n        <a href=\"#type\"><span class=\"n\">04<\u002Fspan><span class=\"l\">Typography<\u002Fspan><\u002Fa>\n        <a href=\"#disc\"><span class=\"n\">05<\u002Fspan><span class=\"l\">The Protein Disc<\u002Fspan><\u002Fa>\n        <a href=\"#voice\"><span class=\"n\">06<\u002Fspan><span class=\"l\">Voice &amp; Tone<\u002Fspan><\u002Fa>\n        <a href=\"#space\"><span class=\"n\">07<\u002Fspan><span class=\"l\">Space, Shape &amp; Light<\u002Fspan><\u002Fa>\n        <a href=\"#icons\"><span class=\"n\">08<\u002Fspan><span class=\"l\">Iconography<\u002Fspan><\u002Fa>\n        <a href=\"#components\"><span class=\"n\">09<\u002Fspan><span class=\"l\">Components<\u002Fspan><\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 01 THE BRAND ============ -->\n  <section class=\"bb-section\" id=\"story\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">01 — The Brand<\u002Fspan>\n        <h2 class=\"bb-title\">Healthy food,<br>minus the punishment<\u002Fh2>\n        <p class=\"bb-lede\">Nobody struggles with <em>knowing<\u002Fem> healthy food matters. The struggle is that it usually tastes like a penalty — bland, predictable, impossible to stick to. Protein Please proves eating well and eating deliciously are the same thing.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\" style=\"align-items:stretch\">\n        <div class=\"panel green\">\n          <p class=\"bb-eyebrow\" style=\"color:var(--pp-pink-300)\">Our five non-negotiables<\u002Fp>\n          <ul style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px\">\n            <li style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"font-family:var(--font-display);font-size:1.3rem;color:var(--pp-pink-300)\">01<\u002Fspan><span>High protein in every single meal<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"font-family:var(--font-display);font-size:1.3rem;color:var(--pp-pink-300)\">02<\u002Fspan><span>Real, whole ingredients — no mystery powders<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"font-family:var(--font-display);font-size:1.3rem;color:var(--pp-pink-300)\">03<\u002Fspan><span>Balanced macros that fit busy schedules<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"font-family:var(--font-display);font-size:1.3rem;color:var(--pp-pink-300)\">04<\u002Fspan><span>Actually tastes good — flavour is not optional<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:12px;align-items:baseline\"><span style=\"font-family:var(--font-display);font-size:1.3rem;color:var(--pp-pink-300)\">05<\u002Fspan><span>No guilt, no cheat days needed<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"panel\" style=\"display:flex;flex-direction:column;justify-content:space-between;gap:24px\">\n          <div>\n            <p class=\"bb-eyebrow\">The offer<\u002Fp>\n            <p style=\"font-size:1.05rem;line-height:1.5;margin:0;color:var(--text-secondary)\">Weekly and monthly protein-rich meal subscriptions, veg and non-veg, delivered chilled and ready in two minutes. Macros on every label. Swap or skip any time.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;border-top:1.5px solid var(--pp-cream-300);padding-top:20px\">\n            <span style=\"width:52px;height:52px;border-radius:50%;background:var(--pp-pink-300);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:var(--pp-green-900)\">SD<\u002Fspan>\n            <div>\n              <div style=\"font-weight:700\">Shruti Desai<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)\">Founder · Chef &amp; Fellow Protein Paglu<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 LOGO ============ -->\n  <section class=\"bb-section\" id=\"logo\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">02 — Logo<\u002Fspan>\n        <h2 class=\"bb-title\">The wordmark<\u002Fh2>\n        <p class=\"bb-lede\">A heavy, condensed, stacked wordmark in all-caps. It is the loudest expression of the brand — give it room and never let it compete.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\">\n        <div>\n          <div class=\"logo-cell\" style=\"background:var(--pp-cream-100)\"><img src=\"f73b45b6-38ac-42c7-953a-5664aaa6ee14\" alt=\"Protein Please green wordmark\"><\u002Fdiv>\n          <p class=\"bb-eyebrow\" style=\"margin-top:12px\">Primary · green on cream<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div class=\"logo-cell\" style=\"background:var(--pp-green-800);border-color:var(--pp-green-800)\"><img src=\"b7fe3336-39e5-4de1-a0f9-441f3a26387c\" alt=\"Protein Please pink wordmark\"><\u002Fdiv>\n          <p class=\"bb-eyebrow\" style=\"margin-top:12px\">Reversed · pink on green<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\" style=\"margin-top:16px\">\n        <div class=\"dd do\">\n          <div class=\"bar\">✓ &nbsp;Do<\u002Fdiv>\n          <ul>\n            <li>Keep clear space of at least one cap-height around the mark.<\u002Fli>\n            <li>Use green-on-cream or pink-on-green only.<\u002Fli>\n            <li>Let it sit large and confident in heroes and packaging.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"dd dont\">\n          <div class=\"bar\">✕ &nbsp;Don't<\u002Fdiv>\n          <ul>\n            <li>Recolour, add gradients, outlines, or drop shadows.<\u002Fli>\n            <li>Stretch, condense further, or rotate the wordmark.<\u002Fli>\n            <li>Place it on a busy photo without a solid colour field.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 COLOR ============ -->\n  <section class=\"bb-section\" id=\"color\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">03 — Color<\u002Fspan>\n        <h2 class=\"bb-title\">Green, pink<br>&amp; warm cream<\u002Fh2>\n        <p class=\"bb-lede\">Forest green is the hero. Soft pink is the foil — a spot, never a flood. Cream is the paper; the brand is never cold grey. Food colours carry the signals.<\u002Fp>\n      <\u002Fdiv>\n\n      <p class=\"bb-eyebrow\">Brand — Green · the hero<\u002Fp>\n      <div class=\"bb-grid cols-5\" style=\"margin-bottom:32px\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-green-900)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">green-900<\u002Fdiv><div class=\"hx\">#13200E<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-green-800)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">green-800 ★<\u002Fdiv><div class=\"hx\">#1D2F17<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-green-700)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">green-700<\u002Fdiv><div class=\"hx\">#284121<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-green-500)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">green-500<\u002Fdiv><div class=\"hx\">#4A7039<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-green-100)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">green-100<\u002Fdiv><div class=\"hx\">#DCE5D4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"bb-eyebrow\">Brand — Pink · the foil<\u002Fp>\n      <div class=\"bb-grid cols-5\" style=\"margin-bottom:32px\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-pink-500)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">pink-500<\u002Fdiv><div class=\"hx\">#DCA7C4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-pink-400)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">pink-400<\u002Fdiv><div class=\"hx\">#E8BBD3<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-pink-300)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">pink-300 ★<\u002Fdiv><div class=\"hx\">#EFCFDF<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-pink-200)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">pink-200<\u002Fdiv><div class=\"hx\">#F5E0EB<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-pink-100)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">pink-100<\u002Fdiv><div class=\"hx\">#FBF0F5<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"bb-eyebrow\">Neutrals — warm cream &amp; stone<\u002Fp>\n      <div class=\"bb-grid cols-5\" style=\"margin-bottom:32px\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-cream-50)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">cream-50<\u002Fdiv><div class=\"hx\">#FBF8EF<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-cream-100)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">cream-100 ★<\u002Fdiv><div class=\"hx\">#F6F2E6<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-cream-200)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">cream-200<\u002Fdiv><div class=\"hx\">#EDE7D4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-cream-300)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">cream-300<\u002Fdiv><div class=\"hx\">#E2DAC2<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-stone-600)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">stone-600<\u002Fdiv><div class=\"hx\">#6E6A58<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"bb-eyebrow\">Signal — from a real plate<\u002Fp>\n      <div class=\"bb-grid cols-3\" style=\"margin-bottom:36px\">\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-leaf)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">leaf<\u002Fdiv><div class=\"hx\">#3E8E4E<\u002Fdiv><div class=\"role\">Veg · success · fresh<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-tomato)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">tomato<\u002Fdiv><div class=\"hx\">#D6462F<\u002Fdiv><div class=\"role\">Non-veg · error · spice<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"sw\"><div class=\"chip\" style=\"background:var(--pp-yolk)\"><\u002Fdiv><div class=\"meta\"><div class=\"nm\">yolk<\u002Fdiv><div class=\"hx\">#E8B23A<\u002Fdiv><div class=\"role\">Warning · highlight<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"bb-eyebrow\">The three canonical pairings<\u002Fp>\n      <div class=\"bb-grid cols-3\">\n        <div class=\"pair\" style=\"background:var(--pp-green-800)\"><span class=\"w\" style=\"color:var(--pp-pink-300)\">Protein<\u002Fspan><span class=\"c\" style=\"color:var(--pp-cream-50)\">Pink on green<\u002Fspan><\u002Fdiv>\n        <div class=\"pair\" style=\"background:var(--pp-cream-100);border:1.5px solid var(--pp-cream-300)\"><span class=\"w\" style=\"color:var(--pp-green-800)\">Please<\u002Fspan><span class=\"c\" style=\"color:var(--pp-stone-600)\">Green on cream<\u002Fspan><\u002Fdiv>\n        <div class=\"pair\" style=\"background:var(--pp-pink-300)\"><span class=\"w\" style=\"color:var(--pp-green-900)\">Yes<\u002Fspan><span class=\"c\" style=\"color:var(--pp-green-800)\">Green on pink<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 TYPE ============ -->\n  <section class=\"bb-section\" id=\"type\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">04 — Typography<\u002Fspan>\n        <h2 class=\"bb-title\">Three voices<\u002Fh2>\n        <p class=\"bb-lede\">A loud condensed display face, a warm legible body grotesque, and a precise monospace for data. The collision of the three is the typographic signature.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"spec\">\n        <div class=\"tag\"><span><b>Anton<\u002Fb> · Display<\u002Fspan><span>UPPERCASE<\u002Fspan><span>line-height 0.88–0.92<\u002Fspan><span>tracking −1%<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:var(--font-display);text-transform:uppercase;line-height:0.88;letter-spacing:-0.01em;color:var(--pp-green-800);font-size:clamp(2.6rem,7vw,5.4rem)\">Eat well,<br>deliciously<\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:0.9rem;color:var(--text-secondary)\">Hero lines, section titles, numbers, the protein disc. Always caps, always tight.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"spec\">\n        <div class=\"tag\"><span><b>Hanken Grotesk<\u002Fb> · Body<\u002Fspan><span>weights 400–900<\u002Fspan><span>sentence case<\u002Fspan><\u002Fdiv>\n        <div class=\"typeline\"><span class=\"lbl\">h1 · 800<\u002Fspan><span style=\"font-size:2rem;font-weight:800;letter-spacing:-0.02em\">Pick what you'll crave<\u002Fspan><\u002Fdiv>\n        <div class=\"typeline\"><span class=\"lbl\">h3 · 700<\u002Fspan><span style=\"font-size:1.3rem;font-weight:700\">Veg &amp; non-veg plans<\u002Fspan><\u002Fdiv>\n        <div class=\"typeline\"><span class=\"lbl\">body · 400<\u002Fspan><span style=\"font-size:1rem\">Crafted so the food is the point — the nutrition just comes along for the ride.<\u002Fspan><\u002Fdiv>\n        <div class=\"typeline\"><span class=\"lbl\">small · 400<\u002Fspan><span style=\"font-size:0.875rem;color:var(--text-secondary)\">Keep refrigerated. Microwave 1–2 minutes before eating.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"spec\">\n        <div class=\"tag\"><span><b>Space Mono<\u002Fb> · Data &amp; labels<\u002Fspan><span>UPPERCASE<\u002Fspan><span>wide tracking<\u002Fspan><span>tabular figures<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:28px;align-items:flex-end\">\n          <div><div style=\"font-family:var(--font-display);font-size:2.4rem;line-height:0.9;color:var(--pp-green-800)\">38g<\u002Fdiv><div style=\"font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:700;margin-top:4px\">Protein<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:var(--font-display);font-size:2.4rem;line-height:0.9;color:var(--pp-green-800)\">42g<\u002Fdiv><div style=\"font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:700;margin-top:4px\">Carbs<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:var(--font-display);font-size:2.4rem;line-height:0.9;color:var(--pp-green-800)\">480<\u002Fdiv><div style=\"font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:700;margin-top:4px\">kcal<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:0.78rem;color:var(--text-secondary);letter-spacing:0.14em\">★ THIS WEEK'S DROP · SKU 0042<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 PROTEIN DISC ============ -->\n  <section class=\"bb-section\" id=\"disc\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">05 — The Protein Disc<\u002Fspan>\n        <h2 class=\"bb-title\">The signature stamp<\u002Fh2>\n        <p class=\"bb-lede\">A tilted disc with a big display number and a mono caption, lifted from the packaging. It stamps heroes, meal cards and the app. Always rotated; the number is always the hero.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel pink\" style=\"display:flex;flex-wrap:wrap;gap:48px;align-items:center;justify-content:center;padding:48px 30px\">\n        <span class=\"disc\" style=\"width:170px;height:170px;background:var(--pp-pink-300);color:var(--pp-green-900);transform:rotate(-12deg)\">\n          <span class=\"num\" style=\"font-size:4.2rem\">38<\u002Fspan><span class=\"unit\" style=\"font-size:0.7rem\">grams of protein<\u002Fspan>\n        <\u002Fspan>\n        <span class=\"disc\" style=\"width:150px;height:150px;background:var(--pp-green-800);color:var(--pp-cream-50);transform:rotate(8deg)\">\n          <span class=\"num\" style=\"font-size:3.6rem\">42<\u002Fspan><span class=\"unit\" style=\"font-size:0.62rem\">grams of protein<\u002Fspan>\n        <\u002Fspan>\n        <span class=\"disc\" style=\"width:130px;height:130px;background:var(--pp-cream-50);color:var(--pp-green-900);transform:rotate(-6deg);border:1.5px solid var(--pp-cream-300)\">\n          <span class=\"num\" style=\"font-size:3rem\">28<\u002Fspan><span class=\"unit\" style=\"font-size:0.54rem\">grams of protein<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 VOICE ============ -->\n  <section class=\"bb-section\" id=\"voice\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">06 — Voice &amp; Tone<\u002Fspan>\n        <h2 class=\"bb-title\">A confident chef<br>who won't be boring<\u002Fh2>\n        <p class=\"bb-lede\">We talk to <em>you<\u002Fem>. We assume you already know healthy matters and skip the lecture — the enemy is blandness, not calories. Warm, direct, a little cheeky. Never preachy, never \"wellness\".<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\" style=\"margin-bottom:16px\">\n        <div class=\"panel\"><p class=\"bb-eyebrow\">Headline<\u002Fp><p style=\"font-family:var(--font-display);text-transform:uppercase;font-size:1.8rem;line-height:0.95;color:var(--pp-green-800);margin:0\">So good you'll forget it's healthy<\u002Fp><\u002Fdiv>\n        <div class=\"panel\"><p class=\"bb-eyebrow\">Body<\u002Fp><p style=\"margin:0;font-size:1.02rem;line-height:1.5\">\"Protein-rich meals crafted so the food is the point — and the nutrition is the bonus. No guilt. No cheat days.\"<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\">\n        <div class=\"dd do\">\n          <div class=\"bar\">✓ &nbsp;Do<\u002Fdiv>\n          <ul>\n            <li>Speak to \"you\"; reframe the struggle as flavour, not science.<\u002Fli>\n            <li>State macros plainly and proudly (38g protein).<\u002Fli>\n            <li>Use the ★ as the accent; keep headlines short and punchy.<\u002Fli>\n            <li>Own the in-joke — \"Protein Paglus\" — affectionately, sparingly.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"dd dont\">\n          <div class=\"bar\">✕ &nbsp;Don't<\u002Fdiv>\n          <ul>\n            <li>Use guilt words: \"cheat\", \"sinful\", \"detox\", \"clean eating\".<\u002Fli>\n            <li>Lecture about nutrition or moralise about food.<\u002Fli>\n            <li>Decorate with emoji grids (one human 👋 is the limit).<\u002Fli>\n            <li>Be clinical, corporate, or \"wellness-brand\" vague.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 07 SPACE / SHAPE / LIGHT ============ -->\n  <section class=\"bb-section\" id=\"space\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">07 — Space, Shape &amp; Light<\u002Fspan>\n        <h2 class=\"bb-title\">Flat, warm,<br>pill-shaped<\u002Fh2>\n        <p class=\"bb-lede\">A 4px spacing grid. Controls are fully pill-shaped — the signature. Cards are flat with hairline cream borders; shadows stay low, warm and rare.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\" style=\"align-items:start\">\n        <div class=\"panel\">\n          <p class=\"bb-eyebrow\">Spacing scale · 4px base<\u002Fp>\n          <div class=\"sprow\"><span class=\"t\">space-2<\u002Fspan><span class=\"p\">8<\u002Fspan><span class=\"bar\" style=\"width:8px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-3<\u002Fspan><span class=\"p\">12<\u002Fspan><span class=\"bar\" style=\"width:12px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-4<\u002Fspan><span class=\"p\">16<\u002Fspan><span class=\"bar\" style=\"width:16px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-5<\u002Fspan><span class=\"p\">24<\u002Fspan><span class=\"bar\" style=\"width:24px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-6<\u002Fspan><span class=\"p\">32<\u002Fspan><span class=\"bar\" style=\"width:32px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-8<\u002Fspan><span class=\"p\">48<\u002Fspan><span class=\"bar\" style=\"width:48px\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sprow\"><span class=\"t\">space-9<\u002Fspan><span class=\"p\">64<\u002Fspan><span class=\"bar\" style=\"width:64px\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div class=\"panel\">\n            <p class=\"bb-eyebrow\">Radius · capsules for controls<\u002Fp>\n            <div class=\"radii\">\n              <div class=\"it\"><div class=\"box\" style=\"border-radius:var(--radius-sm)\"><\u002Fdiv><div class=\"nm\">sm<\u002Fdiv><div class=\"vl\">8px<\u002Fdiv><\u002Fdiv>\n              <div class=\"it\"><div class=\"box\" style=\"border-radius:var(--radius-md)\"><\u002Fdiv><div class=\"nm\">md ★<\u002Fdiv><div class=\"vl\">14px<\u002Fdiv><\u002Fdiv>\n              <div class=\"it\"><div class=\"box\" style=\"border-radius:var(--radius-lg)\"><\u002Fdiv><div class=\"nm\">lg<\u002Fdiv><div class=\"vl\">22px<\u002Fdiv><\u002Fdiv>\n              <div class=\"it\"><div class=\"box\" style=\"border-radius:var(--radius-pill);width:108px\"><\u002Fdiv><div class=\"nm\">pill ★<\u002Fdiv><div class=\"vl\">controls<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"panel\">\n            <p class=\"bb-eyebrow\">Elevation · low &amp; sparing<\u002Fp>\n            <div class=\"elev\">\n              <div class=\"it\"><div class=\"box\" style=\"box-shadow:none\"><\u002Fdiv><div class=\"nm\">none ★<\u002Fdiv><\u002Fdiv>\n              <div class=\"it\"><div class=\"box\" style=\"box-shadow:var(--shadow-sm)\"><\u002Fdiv><div class=\"nm\">sm<\u002Fdiv><\u002Fdiv>\n              <div class=\"it\"><div class=\"box\" style=\"box-shadow:var(--shadow-card)\"><\u002Fdiv><div class=\"nm\">card<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 ICONS ============ -->\n  <section class=\"bb-section\" id=\"icons\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">08 — Iconography<\u002Fspan>\n        <h2 class=\"bb-title\">Clean strokes,<br>one ★<\u002Fh2>\n        <p class=\"bb-lede\">Lucide line icons (~2px stroke) for UI. The ★ asterisk is the brand's typographic accent. Veg / non-veg use the FSSAI square-dot marker. Emoji are essentially unused.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"bb-grid cols-2\" style=\"align-items:start\">\n        <div class=\"panel\">\n          <p class=\"bb-eyebrow\">Lucide · UI affordances<\u002Fp>\n          <div class=\"icons\" id=\"iconStrip\"><\u002Fdiv>\n          <p style=\"font-size:0.82rem;color:var(--text-secondary);margin:16px 0 0\">Substitution: no bespoke icon set was supplied — Lucide is the working standard. Flag if the brand adopts its own.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div class=\"panel\">\n            <p class=\"bb-eyebrow\">Diet markers · FSSAI square-dot<\u002Fp>\n            <div class=\"cluster\">\n              <span class=\"badge veg\"><span class=\"dietsq\" style=\"border:1.5px solid var(--pp-leaf)\"><i style=\"background:var(--pp-leaf)\"><\u002Fi><\u002Fspan>Veg<\u002Fspan>\n              <span class=\"badge nonveg\"><span class=\"dietsq\" style=\"border:1.5px solid var(--pp-tomato)\"><i style=\"background:var(--pp-tomato)\"><\u002Fi><\u002Fspan>Non-veg<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"panel\">\n            <p class=\"bb-eyebrow\">The typographic accent<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:18px\"><span style=\"font-size:3rem;color:var(--pp-pink-500)\">★<\u002Fspan><span style=\"font-family:var(--font-mono);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-secondary)\">Use the star in eyebrows<br>and tags — never emoji.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 COMPONENTS ============ -->\n  <section class=\"bb-section\" id=\"components\">\n    <div class=\"bb-wrap\">\n      <div class=\"bb-head\">\n        <span class=\"bb-num\">09 — Components<\u002Fspan>\n        <h2 class=\"bb-title\">The kit<\u002Fh2>\n        <p class=\"bb-lede\">A small, opinionated set of pill-shaped controls, mono-cased badges, and flat bordered cards. Green is the workhorse; pink is the playful CTA.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"panel\" style=\"margin-bottom:16px\">\n        <p class=\"bb-eyebrow\">Buttons<\u002Fp>\n        <div class=\"cluster\" style=\"margin-bottom:12px\">\n          <span class=\"btn primary caps\">Build my box<\u002Fspan>\n          <span class=\"btn pink\">See the menu →<\u002Fspan>\n          <span class=\"btn outline\">Skip this week<\u002Fspan>\n          <span class=\"btn ghost\">Cancel<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cluster\" style=\"background:var(--pp-green-800);padding:14px;border-radius:var(--radius-md);width:fit-content\">\n          <span class=\"btn inverse\">On dark<\u002Fspan>\n          <span class=\"btn pink\">Pink CTA<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bb-grid cols-2\" style=\"margin-bottom:16px\">\n        <div class=\"panel\">\n          <p class=\"bb-eyebrow\">Badges &amp; tags<\u002Fp>\n          <div class=\"cluster\">\n            <span class=\"badge veg\"><span class=\"dietsq\" style=\"border:1.5px solid var(--pp-leaf)\"><i style=\"background:var(--pp-leaf)\"><\u002Fi><\u002Fspan>Veg<\u002Fspan>\n            <span class=\"badge nonveg\"><span class=\"dietsq\" style=\"border:1.5px solid var(--pp-tomato)\"><i style=\"background:var(--pp-tomato)\"><\u002Fi><\u002Fspan>Non-veg<\u002Fspan>\n            <span class=\"badge pink\">★ Bestseller<\u002Fspan>\n            <span class=\"badge green\">New<\u002Fspan>\n            <span class=\"badge neutral\">Paused<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <p class=\"bb-eyebrow\">Tabs &amp; switch<\u002Fp>\n          <div class=\"cluster\" style=\"gap:18px\">\n            <span class=\"tabs\"><span class=\"on\">Weekly<\u002Fspan><span>Monthly<\u002Fspan><\u002Fspan>\n            <span class=\"pillswitch\"><i><\u002Fi><\u002Fspan>\n            <span class=\"pillswitch off\"><i><\u002Fi><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bb-grid cols-2\">\n        <div class=\"panel\">\n          <p class=\"bb-eyebrow\">Inputs<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div class=\"field\"><label>Email<\u002Flabel><div class=\"ip focus\">you@protein.please<\u002Fdiv><\u002Fdiv>\n            <div class=\"field\"><label>Promo code<\u002Flabel><div class=\"ip\">PAGLU10<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\" style=\"display:flex;flex-direction:column;gap:14px\">\n          <p class=\"bb-eyebrow\" style=\"margin:0\">Meal card<\u002Fp>\n          <div style=\"border:1.5px solid var(--pp-cream-300);border-radius:var(--radius-md);overflow:hidden;background:var(--pp-cream-50)\">\n            <div style=\"height:96px;background:var(--pp-pink-200);position:relative;display:flex;align-items:center;justify-content:center;color:var(--pp-green-800)\">\n              <span class=\"disc\" style=\"position:absolute;top:8px;right:8px;width:54px;height:54px;background:var(--pp-pink-300);color:var(--pp-green-900);transform:rotate(-10deg)\"><span class=\"num\" style=\"font-size:1.3rem\">38<\u002Fspan><span class=\"unit\" style=\"font-size:0.36rem\">g protein<\u002Fspan><\u002Fspan>\n              <span id=\"cardGlyph\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:14px\">\n              <div style=\"display:flex;justify-content:space-between;gap:8px;align-items:flex-start\"><strong style=\"font-family:var(--font-display);text-transform:uppercase;font-size:1.1rem;line-height:1\">Paneer Power Bowl<\u002Fstrong><span class=\"badge veg\" style=\"font-size:0.62rem;padding:3px 9px\"><span class=\"dietsq\" style=\"width:8px;height:8px;border:1.5px solid var(--pp-leaf)\"><i style=\"background:var(--pp-leaf)\"><\u002Fi><\u002Fspan>Veg<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;margin-top:10px;font-family:var(--font-mono);font-size:0.64rem;font-weight:700;color:var(--text-secondary)\"><span>38g P<\u002Fspan><span>480 kcal<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:var(--font-mono);font-size:0.74rem;color:var(--text-muted);margin-top:24px;text-align:center;text-transform:uppercase;letter-spacing:0.1em\">Live React components ship in the design system · namespace ProteinPleaseDesignSystem<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer class=\"footer\">\n  <div class=\"bb-wrap\">\n    <img src=\"b7fe3336-39e5-4de1-a0f9-441f3a26387c\" alt=\"Protein Please\" style=\"height:44px\">\n    <p class=\"footer-tag\">So good you'll<br>forget it's <em>healthy<\u002Fem><\u002Fp>\n    <div class=\"footer-meta\">\n      <span>© 2026 Protein Please · Brand Book v1.0<\u002Fspan>\n      <span>Made by Protein Paglus<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"ab389d34-0bb3-44c9-a155-f7937b22fa1d\"><\u002Fscript>\n<script>\n  (function () {\n    function draw(host, name, size, color, sw) {\n      var L = window.lucide; if (!L) return;\n      var node = (L.icons && L.icons[name]) || L[name]; if (!node) return;\n      var el = L.createElement(node);\n      el.setAttribute('width', size); el.setAttribute('height', size); el.setAttribute('stroke-width', sw || 2);\n      host.appendChild(el);\n    }\n    var names = ['ArrowRight','Check','Plus','User','ShoppingBag','Truck','ChefHat','Salad','Drumstick','Soup','Flame','Heart'];\n    var strip = document.getElementById('iconStrip');\n    if (strip) names.forEach(function (n) {\n      var d = document.createElement('span'); d.className = 'ic';\n      draw(d, n, 24, 'currentColor', 1.9); strip.appendChild(d);\n    });\n    var glyph = document.getElementById('cardGlyph');\n    if (glyph) draw(glyph, 'Salad', 38, 'currentColor', 1.5);\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
